<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="logoo.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Autocollant A3 - Impression</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background-color: #f5f5f5;
      margin: 0;
      padding: 0;
      color: #222;
    }

    .content {
      max-width: 1200px;
      margin: 40px auto;
      padding: 0 20px;
      display: flex;
      justify-content: flex-start;
      align-items: flex-start;
      gap: 30px;
    }

    .slider {
      width: 420px;
      height: 420px;
      overflow: hidden;
      border-radius: 14px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.15);
      background: #fff;
      flex-shrink: 0;
    }

    .slides {
      display: flex;
      width: 100%;
      height: 100%;
      animation: slide 10s infinite;
    }

    .slides img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #fff;
    }

    @keyframes slide {
      0% {transform: translateX(0);}
      50% {transform: translateX(-100%);}
      100% {transform: translateX(0);}
    }

    .product-card {
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.08);
      padding: 25px 30px;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .product-card h2 {
      margin: 0 0 10px;
      font-size: 22px;
      font-weight: 600;
      color: #E6332A;
    }

    label {
      font-weight: 600;
      display: block;
      margin-bottom: 4px;
      color: #333;
      font-size: 14px;
    }

    select, input[type="number"], input[type="file"] {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
      margin-bottom: 12px;
    }

    .two-cols {
      display: flex;
      gap: 20px;
    }

    .two-cols > div {
      flex: 1;
    }

    .price {
      color: #e53935;
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .btn-add {
      background: #111;
      color: #fff;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
      font-size: 14px;
      margin-top: 10px;
    }

    .btn-add:hover {
      background: #e53935;
    }

    @media (max-width: 950px) {
      .content {
        flex-direction: column;
        align-items: center;
      }
      .slider, .product-card {
        width: 95%;
      }
      .two-cols {
        flex-direction: column;
      }
    }.breadcrumb {
  max-width: 1200px;
  margin: 20px auto 0;
  padding: 0 20px;
  font-size: 14px;
  color: #777;
}

.breadcrumb a {
  color: #e53935;
  text-decoration: none;
  font-weight: 500;
}

.breadcrumb a:hover {
  text-decoration: underline;
}

.breadcrumb span {
  color: #222;
  font-weight: 600;
}
  </style>
</head>
<body>
<div class="breadcrumb">
  <a href="index.html">Accueil</a> >
  <a href="vinyle.html">Nos Support Souple</a> >
  <span>Autocollant A3</span>
</div>
  <div class="content">
    <!-- SLIDER -->
    <div class="slider">
      <div class="slides">
        <img src="image/vinyle/Auto A3.jpg" alt="Autocollant A3">
        <img src="image/vinyle/A3 AUTO.jpg" alt="Autocollant A3 Découpé">
      </div>
    </div>

    <!-- PRODUCT CARD -->
    <div class="product-card">
      <h2>Autocollant A3 - Impression</h2>
      <div class="price" id="total-affiche">15 Dhs</div>

      <div>
        <label for="type">Type d'impression :</label>
        <select id="type" onchange="updateTotal()">
          <option value="15">A3 Impression – 15 dh</option>
          <option value="23">A3 Impression Découpé – 23 dh</option>
        </select>
      </div>

      <div>
        <label for="qty">Quantité :</label>
        <input type="number" id="qty" min="1" value="1" onchange="updateTotal()">
      </div>

      <div>
        <label for="fichier">Télécharger votre fichier :</label>
        <input type="file" id="fichier" accept=".pdf,.png,.jpg,.jpeg">
      </div>

      <div class="price-breakdown">
        <strong>Total :</strong> <strong id="total">15 Dhs</strong>
      </div>

      <button class="btn-add" id="btnCommander">Commander</button>
    </div>
  </div>

  <script>
    function updateTotal() {
      const type = parseFloat(document.getElementById("type").value);
      const qty = parseInt(document.getElementById("qty").value) || 1;
      const total = type * qty;

      document.getElementById("total").innerText = total.toFixed(2) + " Dhs";
      document.getElementById("total-affiche").innerText = total.toFixed(2) + " Dhs";
    }

    document.getElementById("btnCommander").addEventListener("click", function() {
      const typeSelect = document.getElementById("type");
      const typeText = typeSelect.options[typeSelect.selectedIndex].text;
      const qty = document.getElementById("qty").value;
      const total = document.getElementById("total").innerText;

      const message = encodeURIComponent(
        "Bonjour, je veux commander :" +
        "\nProduit : Autocollant A3" +
        "\nType : " + typeText +
        "\nQuantité : " + qty +
        "\nTotal : " + total
      );

      window.open("https://wa.me/212670924257?text=" + message, "_blank");
    });

    updateTotal();
  </script>

</body>
</html>
