<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="logoo.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marquage Voiture</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:#f6f6f6;
}

/* HERO */
.hero{
  background:#c50c03;
  color:#fff;
  padding:50px 20px;
  text-align:center;
}

.hero h1{
  font-size:34px;
}

.hero p{
  font-size:15px;
  opacity:0.9;
}

/* CONTAINER */
.container{
  max-width:1100px;
  margin:40px auto;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:30px;
  padding:0 20px;
}

/* IMAGE */
.car-box{
  background:#fff;
  border-radius:12px;
  padding:15px;
  box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

.car-box img{
  width:100%;
  border-radius:10px;
}

/* FORM */
.form-box{
  background:#fff;
  border-radius:12px;
  padding:25px;
  box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

.form-box h2{
  margin-bottom:15px;
  color:#c50c03;
}

/* INPUTS */
.form-group{
  margin-bottom:12px;
}

.form-group label{
  font-size:13px;
  font-weight:500;
  margin-bottom:4px;
  display:block;
}

.form-group input,
.form-group select,
.form-group textarea{
  width:100%;
  padding:10px;
  border:1px solid #ddd;
  border-radius:6px;
  font-size:14px;
}

/* BUTTON */
.btn{
  width:100%;
  padding:12px;
  background:#c50c03;
  color:#fff;
  border:none;
  border-radius:8px;
  font-weight:600;
  cursor:pointer;
  margin-top:10px;
}

.btn:hover{
  background:#a60800;
}

/* INFO BOX */
.info-box{
  background:#fff;
  margin-top:20px;
  padding:20px;
  border-radius:12px;
  box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

.info-box h3{
  color:#c50c03;
  margin-bottom:10px;
}

.info-box ul{
  padding-left:18px;
}

.info-box li{
  margin-bottom:6px;
  font-size:14px;
}

/* MOBILE */
@media(max-width:768px){
  .container{
    grid-template-columns:1fr;
  }

  .hero h1{
    font-size:26px;
  }
}
.breadcrumb {
  max-width: 1200px;
  margin: 20px auto 0;
  padding: 0 20px;
  font-size: 14px;
  color: #777;
}

.breadcrumb a {
  color: #e53935;
  text-decoration: none;
  font-weight: 500;
}

.breadcrumb a:hover {
  text-decoration: underline;
}

.breadcrumb span {
  color: #222;
  font-weight: 600;
}
</style>
</head>

<body>

<!-- HERO -->

  <div class="breadcrumb">
  <a href="index.html">Accueil</a> >
  <span>Habillage de Véhicule
</span>
</div>
<!-- CONTENT -->
<div class="container">

  <!-- IMAGE CAR -->
  <div>
    <div class="car-box">
<img src="image/voiture/attachment_56789204.webp" alt="">    </div>

    <!-- INFO -->
    <div class="info-box">
      <h3>Pourquoi choisir notre service ?</h3>
      <ul>
        <li>✔ Impression haute qualité</li>
        <li>✔ Vinyle résistant (3-5 ans)</li>
        <li>✔ Pose professionnelle</li>
        <li>✔ Design sur mesure</li>
      </ul>
    </div>
  </div>

  <!-- FORM -->
  <div class="form-box">
    <h2>Demander un devis</h2>

    <form onsubmit="sendWhatsApp(event)">

      <div class="form-group">
        <label>Nom complet</label>
        <input type="text" id="nom" required>
      </div>

      <div class="form-group">
        <label>Téléphone</label>
        <input type="text" id="tel" required>
      </div>

      <div class="form-group">
        <label>Ville</label>
        <select id="ville">
          <option>Casablanca</option>
          <option>Rabat</option>
          <option>Sale</option>
          <option>Marrakech</option>
          <option>Tanger</option>
        </select>
      </div>

      <div class="form-group">
        <label>Type de véhicule</label>
        <select id="vehicule">
          <option>Voiture</option>
          <option>Camionnette</option>
          <option>Camion</option>
          <option>Mini Bus</option>
          <option>Moto</option>
        </select>
      </div>

      <div class="form-group">
        <label>Type de covering</label>
        <select id="design">
          <option>Partiel</option>
          <option>Full Covering</option>
          <option>Logo + texte</option>
        </select>
      </div>

      <div class="form-group">
        <label>Couleur souhaitée</label>
        <input type="text" id="couleur" placeholder="Ex: Rouge, Noir mat">
      </div>

      <div class="form-group">
        <label>Ajouter votre logo</label>
        <input type="file">
      </div>

      <div class="form-group">
        <label>Détails</label>
        <textarea id="details"></textarea>
      </div>

<button type="submit" class="btn">Envoyer via WhatsApp</button>
    </form>
    <p style="font-size:12px; text-align:center; color:#666;">
Après avoir cliqué, appuyez sur "Envoyer" dans WhatsApp
</p>
  </div>

</div>

<!-- JS -->
<script>
function sendWhatsApp(e){
  e.preventDefault();

  let nom = document.getElementById("nom").value;
  let tel = document.getElementById("tel").value;
  let ville = document.getElementById("ville").value;
  let vehicule = document.getElementById("vehicule").value;
  let design = document.getElementById("design").value;
  let couleur = document.getElementById("couleur").value;
  let details = document.getElementById("details").value;

  let text = 
`📄 *DEMANDE DEVIS - HABILLAGE VÉHICULE*

👤 Nom: ${nom}
📞 Téléphone: ${tel}
📍 Ville: ${ville}

🚗 Véhicule: ${vehicule}
🎨 Type: ${design}
🎯 Couleur: ${couleur}

📝 Détails:
${details}

--------------------------
Merci 🙏`;

  let url = "https://wa.me/212670924257?text=" + encodeURIComponent(text);

  window.open(url, "_blank");
}
</script>

</body>
</html>
