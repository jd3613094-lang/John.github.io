<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="logoo.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vinyle - Impression sur mesure</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background-color: #f5f5f5;
      margin: 0;
      padding: 0;
      color: #222;
    }

    .content {
      max-width: 1200px;
      margin: 40px auto;
      padding: 0 20px;
      display: flex;
      justify-content: flex-start;
      align-items: flex-start;
      gap: 30px;
    }

    .slider {
      width: 420px;
      height: 420px;
      overflow: hidden;
      border-radius: 14px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.15);
      background: #fff;
      flex-shrink: 0;
    }

    .slides {
      display: flex;
      width: 100%;
      height: 100%;
      animation: slide 12s infinite;
    }

    .slides img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #fff;
    }

    @keyframes slide {
      0% {transform: translateX(0);}
      50% {transform: translateX(-100%);}
      100% {transform: translateX(0);}
    }

    .product-card {
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.08);
      padding: 25px 30px;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .product-card h2 {
      margin: 0 0 10px;
      font-size: 22px;
      font-weight: 600;
      color: #E6332A;
    }

    label {
      font-weight: 600;
      display: block;
      margin-bottom: 4px;
      color: #333;
      font-size: 14px;
    }

    select, input[type="number"], input[type="file"] {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
      margin-bottom: 12px;
    }

    .two-cols {
      display: flex;
      gap: 20px;
    }

    .two-cols > div {
      flex: 1;
    }

    .price {
      color: #e53935;
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .btn-add {
      background: #111;
      color: #fff;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
      font-size: 14px;
      margin-top: 10px;
    }

    .btn-add:hover {
      background: #e53935;
    }

    @media (max-width: 950px) {
      .content {
        flex-direction: column;
        align-items: center;
      }
      .slider, .product-card {
        width: 95%;
      }
      .two-cols {
        flex-direction: column;
      }
    }.breadcrumb {
  max-width: 1200px;
  margin: 20px auto 0;
  padding: 0 20px;
  font-size: 14px;
  color: #777;
}

.breadcrumb a {
  color: #e53935;
  text-decoration: none;
  font-weight: 500;
}

.breadcrumb a:hover {
  text-decoration: underline;
}

.breadcrumb span {
  color: #222;
  font-weight: 600;
}
  </style>
</head>
<body>
<div class="breadcrumb">
  <a href="index.html">Accueil</a> >
  <a href="vinyle.html">Nos Support Souple</a> >
  <span> Impression sur mesure</span>
</div>
  <div class="content">
    <!-- SLIDER -->
    <div class="slider">
      <div class="slides">
        <img src="image/vinyle/picvi3.jpg" alt="Vinyle">
        <img src="image/vinyle/picviny.jpg" alt="Vinyle">
      </div>
    </div>

    <!-- PRODUCT CARD -->
    <div class="product-card">
      <h2>Vinyle - Impression sur mesure</h2>
      <div class="price" id="total-affiche">0 Dhs</div>

      <div class="two-cols">
        <div>
          <label for="largeur">Largeur (m) :</label>
          <input type="number" id="largeur" min="1" value="1" onchange="updateTotal()">
        </div>
        <div>
          <label for="hauteur">Hauteur (m) :</label>
          <input type="number" id="hauteur" min="1" value="1" onchange="updateTotal()">
        </div>
      </div>

      <div class="two-cols">
        <div>
          <label for="type">Type de vinyle :</label>
          <select id="type" onchange="updateTotal()">
            <option value="normal">Normal</option>
            <option value="mat">Mat</option>
            <option value="transparent">Transparent</option>
          </select>
        </div>
        <div>
          <label for="qty">Quantité :</label>
          <input type="number" id="qty" min="1" value="1" onchange="updateTotal()">
        </div>
      </div>

      <div>
        <label for="fichier">Ajouter un fichier PDF :</label>
        <input type="file" id="fichier" accept=".pdf">
      </div>

      <div class="price-breakdown">
        <strong>Total :</strong> <strong id="total">0 Dhs</strong>
      </div>

      <button class="btn-add" id="btnCommander">Commander</button>
    </div>
  </div>

  <script>
    function updateTotal() {
      let largeur = parseFloat(document.getElementById("largeur").value) || 0;
      let hauteur = parseFloat(document.getElementById("hauteur").value) || 0;
      let type = document.getElementById("type").value;
      let qty = parseInt(document.getElementById("qty").value) || 1;

      // ✅ الأسعار غير ظاهرة في الصفحة
      let prixVinyle = {
        normal: 50,
        mat: 70,
        transparent: 70
      };

      // الحساب بالمتر المربع × الكمية
      let surface = largeur * hauteur;
      let total = surface * prixVinyle[type] * qty;

      document.getElementById("total").innerText = total.toFixed(2) + " Dhs";
      document.getElementById("total-affiche").innerText = total.toFixed(2) + " Dhs";
    }

    document.getElementById("btnCommander").addEventListener("click", function() {
      let largeur = document.getElementById("largeur").value;
      let hauteur = document.getElementById("hauteur").value;
      let typeTxt = document.getElementById("type").options[document.getElementById("type").selectedIndex].text;
      let qty = document.getElementById("qty").value;
      let total = document.getElementById("total").innerText;

      let message = encodeURIComponent(
        "Bonjour, je veux commander :" +
        "\nProduit : Vinyle" +
        "\nType : " + typeTxt +
        "\nDimensions : " + largeur + "m x " + hauteur + "m" +
        "\nQuantité : " + qty +
        "\nTotal : " + total
      );

      window.open("https://wa.me/212670924257?text=" + message, "_blank");
    });

    updateTotal();
  </script>

</body>
</html>
